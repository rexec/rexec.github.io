<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>美丽页面</title>
    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
        color: #333;
        line-height: 1.6;
      }
      
      h1 {
        font-size: 36px;
        text-align: center;
        color: #333;
        margin-bottom: 40px;
      }
      
      p {
        font-size: 18px;
        line-height: 1.6;
        text-align: center;
        max-width: 80%;
        margin: 0 auto;
      }
      
      .container {
        width: 80%;
        margin: 0 auto;
        padding: 50px;
      }
      
      .button {
        display: inline-block;
        background-color: #4CAF50;
        color: #fff;
        text-align: center;
        padding: 10px 20px;
        margin: 40px auto;
        border-radius: 5px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>欢迎来到我的网站！</h1>
      <p>这里没有内容.</p>
    </div>
  </body>
</html>
